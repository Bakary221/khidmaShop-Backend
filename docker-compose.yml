version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: khidmashop_postgres
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
      POSTGRES_DB: khidmashop
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - khidma_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  khidma_network:
    driver: bridge
